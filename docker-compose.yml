services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:///./layali_dev.db
      FRONTEND_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      ENABLE_IP_FRAUD_CHECK: "false"
    volumes:
      - backend_data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_ENABLE_PIXELS: "false"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

volumes:
  backend_data:
