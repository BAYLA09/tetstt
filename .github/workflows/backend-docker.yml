name: Backend Docker build

on:
  push:
    branches: [deploy-backend, layali-api]
  pull_request:
    branches: [deploy-backend, layali-api]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (Easypanel uses same Dockerfile)
        run: docker build -t layali-api:ci .
