# VPS / Coolify-style deploy: explicit image tag, no EasyPanel cache.
# From repo root:
#   export COMMIT_SHA=$(git rev-parse --short HEAD)
#   export BUILD_TIME_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
#   export CACHE_BUST=$(date +%s)
#   docker compose -f deploy/docker-compose.backend.yml build --no-cache --pull
#   docker compose -f deploy/docker-compose.backend.yml up -d --force-recreate

services:
  api:
    image: layali-api:${COMMIT_SHA:-dev}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-dev}
        BUILD_TIME_UTC: ${BUILD_TIME_UTC:-unknown}
        CACHE_BUST: ${CACHE_BUST:-manual}
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
