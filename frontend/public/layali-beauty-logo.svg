<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 560 360"
  width="560"
  height="360"
  fill="none"
>
  <defs>
    <!-- Gold gradient – main horizontal shimmer -->
    <linearGradient id="gH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#EDD070"/>
      <stop offset="30%"  stop-color="#C9922A"/>
      <stop offset="60%"  stop-color="#E2B84A"/>
      <stop offset="100%" stop-color="#A87520"/>
    </linearGradient>
    <!-- Gold gradient – vertical for text fill depth -->
    <linearGradient id="gV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0D47A"/>
      <stop offset="42%"  stop-color="#C9922A"/>
      <stop offset="100%" stop-color="#8C610C"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <filter id="glow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow for text -->
    <filter id="txtShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#7a4a00" flood-opacity="0.25"/>
    </filter>
    <!-- Font styles (loaded when SVG is used inline or in browser) -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;family=Cormorant+Garamond:wght@500&amp;display=swap');
      .script { font-family: 'Dancing Script', 'Brush Script MT', cursive; }
      .caps   { font-family: 'Cormorant Garamond', Georgia, serif; }
    </style>
  </defs>

  <!-- ══ Crescent moon ══ -->
  <g transform="translate(362, 54)" filter="url(#glow)">
    <!-- outer circle minus inner offset circle = crescent -->
    <path
      d="M38 0
         A32 32 0 1 0 38 64
         A20 20 0 1 1 38 0 Z"
      fill="url(#gH)"
      opacity="0.97"
    />
  </g>

  <!-- ══ Sparkle – large four-point star ══ -->
  <g transform="translate(320, 48)" filter="url(#glow)">
    <path
      d="M0,-10 L2.4,-2.4 L10,0 L2.4,2.4 L0,10 L-2.4,2.4 L-10,0 L-2.4,-2.4 Z"
      fill="url(#gH)"
    />
  </g>

  <!-- ══ Sparkle – small four-point star ══ -->
  <g transform="translate(348, 78)" filter="url(#glow)">
    <path
      d="M0,-6 L1.4,-1.4 L6,0 L1.4,1.4 L0,6 L-1.4,1.4 L-6,0 L-1.4,-1.4 Z"
      fill="url(#gH)"
      opacity="0.85"
    />
  </g>

  <!-- ══ "Layali" script text ══ -->
  <text
    x="52"
    y="218"
    class="script"
    font-size="172"
    font-weight="700"
    fill="url(#gV)"
    filter="url(#txtShadow)"
    letter-spacing="-3"
  >Layali</text>

  <!-- ══ Thin gold rule ══ -->
  <line
    x1="100"
    y1="238"
    x2="460"
    y2="238"
    stroke="url(#gH)"
    stroke-width="0.9"
    opacity="0.48"
  />

  <!-- ══ "BEAUTY" small caps ══ -->
  <text
    x="280"
    y="278"
    class="caps"
    font-size="36"
    font-weight="500"
    fill="url(#gV)"
    letter-spacing="16"
    text-anchor="middle"
    filter="url(#txtShadow)"
  >BEAUTY</text>
</svg>
